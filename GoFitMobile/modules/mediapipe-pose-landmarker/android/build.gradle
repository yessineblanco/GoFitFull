plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.mediapipeposelandmarker'
version = '0.7.10'

android {
  namespace "expo.modules.mediapipeposelandmarker"
  defaultConfig {
    versionCode 1
    versionName "0.7.10"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "androidx.exifinterface:exifinterface:1.4.1"
  implementation "com.google.mediapipe:tasks-vision:0.10.33"
}
